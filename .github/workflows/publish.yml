name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # v1.0.1, v1.2.0 등 태그 push 시 실행

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release     # npmjs.com Trusted Publishing 설정과 매칭

    permissions:
      id-token: write        # OIDC 토큰 발급에 필수
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm test

      - run: npm publish --provenance --access public
